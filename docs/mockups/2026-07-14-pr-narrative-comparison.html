      const requested = new URLSearchParams(window.location.search).get('concept')?.toUpperCase();
      const activeKey = payloads[requested] ? requested : 'A';
      const bytes = Uint8Array.from(atob(payloads[activeKey]), (character) => character.charCodeAt(0));
      const source = new TextDecoder().decode(bytes);
      document.open();
      document.write(source);
      document.close();
    };
